enabled-by: true
functional-type: action
links:
- role: interface-function
  uid: ../if/pthread-condattr-setpshared
post-conditions:
- name: Status
  states:
  - name: Zero
    test-code: |
      T_eq_int( ctx->status, 0 );
    text: |
      The return value of ${../if/pthread-condattr-setpshared:/name} shall be equal to zero.
  - name: EINVAL
    test-code: |
      T_eq_int( ctx->status, EINVAL );
    text: |
      The return value of ${../if/pthread-condattr-setpshared:/name} shall be equal to
      ${../if/einval:/name}.
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Attr
  states:
  - name: Init
    test-code: |
      pthread_condattr_init( &ctx->attr_obj );
      ctx->attr = &ctx->attr_obj;
    text: |
      While the object referenced by the ``attr`` parameter is an
      initialized attributes object.
  - name: 'Null'
    test-code: |
      ctx->attr = NULL;
    text: |
      While the ``attr`` parameter is equal to NULL.
  test-epilogue: null
  test-prologue: null
- name: Value
  states:
  - name: Valid
    test-code: |
      ctx->newval = PTHREAD_PROCESS_PRIVATE;
    text: |
      While the value parameter is a supported value.
  - name: Invalid
    test-code: |
      ctx->newval = 0x7fffffff;
    text: |
      While the value parameter is not a supported value.
  test-epilogue: null
  test-prologue: null
rationale: null
