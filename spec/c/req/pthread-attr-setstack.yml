- name: Attr
  states:
  - name: Init
    test-code: |
      pthread_attr_init( &ctx->attr_obj );
      ctx->attr = &ctx->attr_obj;
    text: |
      While the object referenced by the ``attr`` parameter is an
      initialized thread attributes object.
  - name: 'Null'
    test-code: |
      ctx->attr = NULL;
    text: |
      While the ``attr`` parameter is equal to NULL.
