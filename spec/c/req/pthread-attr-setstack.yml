    test-code: |
      T_eq_int( ctx->status, 0 );
    text: |
      The return value of ${../if/pthread-attr-setstack:/name} shall be equal to zero.
  - name: EINVAL
    test-code: |
      T_eq_int( ctx->status, EINVAL );
    text: |
      The return value of ${../if/pthread-attr-setstack:/name} shall be equal to
      ${../if/einval:/name}.
  test-epilogue: null
  test-prologue: null
