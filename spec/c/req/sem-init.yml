skip-reasons: {}
test-action: 'errno = 0;

  ctx->status = sem_init( ctx->sem, 0, ctx->value );

  '
test-brief: null
test-cleanup: "if ( ctx->status == 0 ) {\n  (void) sem_destroy( &ctx->sem_obj );\n}\n"
