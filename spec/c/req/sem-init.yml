test-prepare: null
test-setup: null
test-stop: null
test-support: null
test-target: testsuites/validation/tc-sem-init.c
test-teardown: null
text: ${.:text-template}
transition-map:
- enabled-by: true
  post-conditions:
    Status: Zero
  pre-conditions:
    Sem:
    - Valid
- enabled-by: true
  post-conditions:
    Status: EINVAL
  pre-conditions:
    Sem:
    - 'Null'
