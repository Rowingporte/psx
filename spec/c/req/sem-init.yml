enabled-by: true
functional-type: action
links:
- role: interface-function
  uid: ../if/sem-init
post-conditions:
- name: Status
  states:
  - name: Zero
    test-code: 'T_eq_int( ctx->status, 0 );

      '
    text: 'The return value of ${../if/sem-init:/name} shall be equal to zero.

      '
  - name: EINVAL
    test-code: 'T_eq_int( ctx->status, -1 );

      T_eq_int( errno, EINVAL );

      '
    text: 'The ${../if/sem-init:/name} call shall indicate the ${../if/einval:/name} error.

      '
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Sem
  states:
  - name: Valid
    test-code: 'ctx->sem = &ctx->sem_obj;

      '
    text: 'While the ``sem`` parameter references an object.

      '
  - name: 'Null'
    test-code: 'ctx->sem = NULL;

      '
    text: 'While the ``sem`` parameter is equal to NULL.

      '
  test-epilogue: null
  test-prologue: null
- name: Value
  states:
  - name: Valid
    test-code: 'ctx->value = 1;

      '
    text: 'While the ``value`` parameter is less than or equal to SEM_VALUE_MAX.

      '
  - name: TooLarge
    test-code: 'ctx->value = (unsigned int) SEM_VALUE_MAX + 1u;

      '
    text: 'While the ``value`` parameter is greater than SEM_VALUE_MAX.

      '
  test-epilogue: null
  test-prologue: null
rationale: null
