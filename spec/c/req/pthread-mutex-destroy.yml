enabled-by: true
functional-type: action
links:
- role: interface-function
  uid: ../if/pthread-mutex-destroy
post-conditions:
- name: Status
  states:
  - name: Zero
    test-code: |
      T_eq_int( ctx->status, 0 );
    text: |
      The return value of ${../if/pthread-mutex-destroy:/name} shall be equal to
      zero.
  - name: EBUSY
    test-code: |
      T_eq_int( ctx->status, EBUSY );
    text: |
      The return value of ${../if/pthread-mutex-destroy:/name} shall be equal to
      ${../if/ebusy:/name}.
  - name: EINVAL
    test-code: |
      T_eq_int( ctx->status, EINVAL );
    text: |
      The return value of ${../if/pthread-mutex-destroy:/name} shall be equal to
      ${../if/einval:/name}.
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Mutex
  states:
  - name: Initialized
    test-code: |
      pthread_mutex_init( &ctx->mutex_obj, NULL );
      ctx->mutex = &ctx->mutex_obj;
    text: |
      While the object referenced by the ``mutex`` parameter is an initialized
      mutex which is unlocked.
  - name: Locked
    test-code: |
      pthread_mutex_init( &ctx->mutex_obj, NULL );
      T_eq_int( pthread_mutex_lock( &ctx->mutex_obj ), 0 );
      ctx->mutex = &ctx->mutex_obj;
    text: |
      While the object referenced by the ``mutex`` parameter is an initialized
      mutex which is locked by the calling thread.
  - name: Invalid
    test-code: |
      pthread_mutex_init( &ctx->mutex_obj, NULL );
      T_eq_int( pthread_mutex_destroy( &ctx->mutex_obj ), 0 );
      ctx->mutex = &ctx->mutex_obj;
    text: |
      While the object referenced by the ``mutex`` parameter is not an
      initialized mutex.
  test-epilogue: null
  test-prologue: null
rationale: null
references: []
requirement-type: functional
skip-reasons: {}
test-action: |
  ctx->status = pthread_mutex_destroy( ctx->mutex );
test-brief: null
test-cleanup: |
  if ( ctx->status != 0 ) {
    (void) pthread_mutex_unlock( &ctx->mutex_obj );
    (void) pthread_mutex_destroy( &ctx->mutex_obj );
  }
test-context:
- brief: |
    This member provides the object referenced by the ``mutex`` parameter.
  description: null
  member: |
    pthread_mutex_t mutex_obj
- brief: |
    This member specifies the ``mutex`` parameter value.
  description: null
  member: |
    pthread_mutex_t *mutex
- brief: |
    This member contains the return value of the
    ${../if/pthread-mutex-destroy:/name} call.
  description: null
  member: |
    int status
test-context-support: null
test-description: null
test-header: null
test-includes:
- pthread.h
- errno.h
test-local-includes:
- tx-support.h
test-prepare: null
test-setup: null
test-stop: null
test-support: null
test-target: testsuites/validation/tc-pthread-mutex-destroy.c
test-teardown: null
text: ${.:text-template}
transition-map:
- enabled-by: true
  post-conditions:
    Status: Zero
  pre-conditions:
    Mutex:
    - Initialized
- enabled-by: true
  post-conditions:
    Status: EBUSY
  pre-conditions:
    Mutex:
    - Locked
- enabled-by: true
  post-conditions:
    Status: EINVAL
  pre-conditions:
    Mutex:
    - Invalid
type: requirement
