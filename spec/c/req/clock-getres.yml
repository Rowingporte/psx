links:
- role: interface-function
  uid: ../if/clock-getres
post-conditions:
- name: Status
  states:
  - name: Zero
    test-code: |
      T_eq_int( ctx->status, 0 );
    text: |
      The return value of ${../if/clock-getres:/name} shall be equal to zero.
  - name: EINVAL
    test-code: |
      T_eq_int( ctx->status, -1 );
      T_eq_int( errno, EINVAL );
    text: |
      The ${../if/clock-getres:/name} call shall indicate the ${../if/einval:/name} error.
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Clock
  states:
  - name: Valid
    test-code: |
      ctx->clock = CLOCK_REALTIME;
    text: |
      While the ``clock_id`` parameter identifies a supported clock.
  - name: Invalid
    test-code: |
      ctx->clock = (clockid_t) 0x7fffffff;
    text: |
      While the ``clock_id`` parameter does not identify a supported clock.
  test-epilogue: null
  test-prologue: null
