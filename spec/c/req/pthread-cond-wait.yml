test-support: |
  typedef ${.:/test-context-type} Context;

  static void *CondWaitWorker( void *arg )
  {
    Context *ctx = arg;
    (void) pthread_mutex_lock( &ctx->mutex );
    (void) pthread_cond_signal( &ctx->cond );
    (void) pthread_mutex_unlock( &ctx->mutex );
    return NULL;
  }
