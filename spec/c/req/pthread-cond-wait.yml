      The return value of ${../if/pthread-cond-wait:/name} shall be equal to zero.
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Signal
  states:
  - name: FromWorker
    test-code: |
      /* worker thread will issue the signal */
    text: |
      While a second thread signals the condition variable.
  test-epilogue: null
  test-prologue: null
rationale: null
references: []
requirement-type: functional
skip-reasons: {}
test-action: |
  T_eq_int( pthread_mutex_lock( &ctx->mutex ), 0 );
  T_eq_int( pthread_create( &ctx->worker, NULL, CondWaitWorker, ctx ), 0 );
  ctx->status = pthread_cond_wait( &ctx->cond, &ctx->mutex );
  (void) pthread_mutex_unlock( &ctx->mutex );
  (void) pthread_join( ctx->worker, NULL );
test-brief: null
test-cleanup: |
  (void) pthread_cond_destroy( &ctx->cond );
  (void) pthread_mutex_destroy( &ctx->mutex );
