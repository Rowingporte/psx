post-conditions:
- name: Status
  states:
  - name: Zero
    test-code: 'T_eq_int( ctx->status, 0 );

      '
    text: 'The return value of ${../if/pthread-attr-setscope:/name} shall be equal to 0.

      '
  - name: EINVAL
    test-code: 'T_eq_int( ctx->status, EINVAL );

      '
    text: 'The return value of ${../if/pthread-attr-setscope:/name} shall be equal to EINVAL.

      '
  - name: ENOTSUP
    test-code: 'T_eq_int( ctx->status, ENOTSUP );

      '
    text: 'The return value of ${../if/pthread-attr-setscope:/name} shall be equal to ENOTSUP.

      '
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Attr
  states:
  - name: Init
    test-code: 'pthread_attr_init( &ctx->attr_obj );

      ctx->attr = &ctx->attr_obj;

      '
    text: 'While the object referenced by the ``attr`` parameter is an initialized attributes object.

      '
  - name: Uninitialized
    test-code: 'memset( &ctx->attr_obj, 0, sizeof( ctx->attr_obj ) );

      ctx->attr = &ctx->attr_obj;

      '
    text: 'While the object referenced by the ``attr`` parameter is uninitialized.

      '
  - name: 'Null'
    test-code: 'ctx->attr = NULL;

      '
    text: 'While the ``attr`` parameter is equal to NULL.

      '
  test-epilogue: null
  test-prologue: null
- name: Value
  states:
  - name: Process
    test-code: 'ctx->newval = PTHREAD_SCOPE_PROCESS;

      '
    text: 'While the ``contentionscope`` parameter is Process.

      '
  - name: System
    test-code: 'ctx->newval = PTHREAD_SCOPE_SYSTEM;

      '
    text: 'While the ``contentionscope`` parameter is System.

      '
  - name: Invalid
    test-code: 'ctx->newval = 0x7fffffff;

      '
    text: 'While the ``contentionscope`` parameter is Invalid.

      '
  test-epilogue: null
  test-prologue: null
