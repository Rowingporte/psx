enabled-by: true
functional-type: action
links:
- role: interface-function
  uid: ../if/sem-timedwait
post-conditions:
- name: Status
  states:
  - name: Zero
    test-code: |
      T_eq_int( ctx->status, 0 );
    text: |
      The return value of ${../if/sem-timedwait:/name} shall be equal to zero.
  - name: ETIMEDOUT
    test-code: |
      T_eq_int( ctx->status, -1 );
      T_eq_int( errno, ETIMEDOUT );
    text: |
      The ${../if/sem-timedwait:/name} call shall indicate the ${../if/etimedout:/name} error.
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Sem
  states:
  - name: Available
    test-code: |
      T_eq_int( sem_init( &ctx->sem_obj, 0, 1 ), 0 );
      ctx->sem = &ctx->sem_obj;
    text: |
      While the semaphore is initialized with a positive value.
  - name: Unavailable
    test-code: |
      T_eq_int( sem_init( &ctx->sem_obj, 0, 0 ), 0 );
      ctx->sem = &ctx->sem_obj;
    text: |
      While the semaphore is initialized with a zero value.
  test-epilogue: null
  test-prologue: null
rationale: null
references: []
requirement-type: functional
skip-reasons: {}
test-action: |
  errno = 0;
  T_eq_int( clock_gettime( CLOCK_REALTIME, &ctx->abstime ), 0 );
  ctx->abstime.tv_sec -= 1;
  ctx->status = sem_timedwait( ctx->sem, &ctx->abstime );
test-brief: null
test-cleanup: |
  (void) sem_destroy( &ctx->sem_obj );
test-context:
