functional-type: action
links:
- role: interface-function
  uid: ../if/pthread-once
post-conditions:
- name: Status
  states:
  - name: Zero
    test-code: 'T_eq_int( ctx->status, 0 );

      T_eq_int( OnceCounter, 1 );

      '
    text: 'The return value shall be zero and the routine shall have run once.

      '
  - name: EINVAL
    test-code: 'T_eq_int( ctx->status, EINVAL );

      '
    text: 'The return value shall be EINVAL.

      '
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Control
  states:
  - name: Fresh
    test-code: 'OnceCounter = 0;

      ctx->control = (pthread_once_t) PTHREAD_ONCE_INIT;

      ctx->once = &ctx->control;

      '
    text: 'While the once control object is fresh.

      '
  - name: 'Null'
    test-code: 'ctx->once = NULL;

      '
    text: 'While the ``once_control`` parameter is NULL.

      '
  test-epilogue: null
  test-prologue: null
- name: Routine
  states:
  - name: Valid
    test-code: 'ctx->init = OnceInit;

      '
    text: 'While the ``init_routine`` parameter references a function.

      '
  - name: 'Null'
    test-code: 'ctx->init = NULL;

      '
    text: 'While the ``init_routine`` parameter is NULL.

      '
  test-epilogue: null
  test-prologue: null
