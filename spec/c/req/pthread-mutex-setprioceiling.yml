enabled-by: true
functional-type: action
links:
- role: interface-function
  uid: ../if/pthread-mutex-setprioceiling
post-conditions:
- name: Status
  states:
  - name: Zero
    test-code: |
      T_eq_int( ctx->status, 0 );
    text: |
      The return value of ${../if/pthread-mutex-setprioceiling:/name} shall be equal to zero.
  - name: EINVAL
    test-code: |
      T_eq_int( ctx->status, EINVAL );
    text: |
      The return value of ${../if/pthread-mutex-setprioceiling:/name} shall be equal to
      ${../if/einval:/name}.
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Mutex
  states:
  - name: Ceiling
    test-code: |
      pthread_mutexattr_init( &ctx->attr );
      pthread_mutexattr_setprotocol( &ctx->attr, PTHREAD_PRIO_PROTECT );
      pthread_mutex_init( &ctx->mutex_obj, &ctx->attr );
      ctx->mutex = &ctx->mutex_obj;
    text: |
      While the object referenced by the ``mutex`` parameter is an
      initialized mutex using the priority ceiling protocol.
  - name: Invalid
    test-code: |
      memset( &ctx->mutex_obj, 0, sizeof( ctx->mutex_obj ) );
      ctx->mutex = &ctx->mutex_obj;
    text: |
      While the object referenced by the ``mutex`` parameter is not an
      initialized mutex.
  test-epilogue: null
  test-prologue: null
- name: Old
  states:
  - name: Valid
    test-code: |
      ctx->old_ptr = &ctx->old;
    text: |
      While the ``old_ceiling`` parameter references an object.
  - name: 'Null'
    test-code: |
      ctx->old_ptr = NULL;
    text: |
      While the ``old_ceiling`` parameter is equal to NULL.
  test-epilogue: null
  test-prologue: null
rationale: null
references: []
requirement-type: functional
skip-reasons: {}
test-action: |
  ctx->status = pthread_mutex_setprioceiling( ctx->mutex, 1, ctx->old_ptr );
test-brief: null
test-cleanup: |
  (void) pthread_mutex_destroy( &ctx->mutex_obj );
