- name: Attr
  states:
  - name: Init
    test-code: |
      pthread_mutexattr_init( &ctx->attr_obj );
      ctx->attr = &ctx->attr_obj;
    text: |
      While the object referenced by the ``attr`` parameter is an
      initialized mutex attributes object.
  - name: Uninit
    test-code: |
      memset( &ctx->attr_obj, 0, sizeof( ctx->attr_obj ) );
      ctx->attr = &ctx->attr_obj;
    text: |
      While the object referenced by the ``attr`` parameter is not an
      initialized mutex attributes object.
  test-epilogue: null
  test-prologue: null
- name: Value
  states:
  - name: Valid
    test-code: |
      ctx->value_ptr = &ctx->value;
    text: |
