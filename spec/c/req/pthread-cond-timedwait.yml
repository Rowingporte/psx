post-conditions:
- name: Status
  states:
  - name: ETIMEDOUT
    test-code: |
      T_eq_int( ctx->status, ETIMEDOUT );
    text: |
      The return value of ${../if/pthread-cond-timedwait:/name} shall be equal to
      ${../if/etimedout:/name}.
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Deadline
  states:
  - name: Past
    test-code: |
      T_eq_int( clock_gettime( CLOCK_REALTIME, &ctx->abstime ), 0 );
      ctx->abstime.tv_sec -= 1;
    text: |
      While the ``abstime`` parameter is in the past.
  test-epilogue: null
  test-prologue: null
rationale: null
references: []
requirement-type: functional
skip-reasons: {}
test-action: |
  T_eq_int( pthread_mutex_lock( &ctx->mutex ), 0 );
  ctx->status = pthread_cond_timedwait( &ctx->cond, &ctx->mutex, &ctx->abstime );
  (void) pthread_mutex_unlock( &ctx->mutex );
test-brief: null
test-cleanup: |
  (void) pthread_cond_destroy( &ctx->cond );
  (void) pthread_mutex_destroy( &ctx->mutex );
