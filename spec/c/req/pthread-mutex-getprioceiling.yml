enabled-by: true
functional-type: action
links:
- role: interface-function
  uid: ../if/pthread-mutex-getprioceiling
post-conditions:
- name: Status
  states:
  - name: Zero
    test-code: |
      T_eq_int( ctx->status, 0 );
    text: |
      The return value of ${../if/pthread-mutex-getprioceiling:/name} shall be equal to zero.
  - name: EINVAL
    test-code: |
      T_eq_int( ctx->status, EINVAL );
    text: |
      The return value of ${../if/pthread-mutex-getprioceiling:/name} shall be equal to
      ${../if/einval:/name}.
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Mutex
  states:
  - name: Valid
    test-code: |
      pthread_mutex_init( &ctx->mutex_obj, NULL );
      ctx->mutex = &ctx->mutex_obj;
    text: |
      While the object referenced by the ``mutex`` parameter is an
      initialized mutex.
  - name: Invalid
    test-code: |
      memset( &ctx->mutex_obj, 0, sizeof( ctx->mutex_obj ) );
      ctx->mutex = &ctx->mutex_obj;
    text: |
      While the object referenced by the ``mutex`` parameter is not an
      initialized mutex.
  test-epilogue: null
  test-prologue: null
- name: Prio
  states:
  - name: Valid
    test-code: |
      ctx->prio_ptr = &ctx->prio;
    text: |
      While the ``prioceiling`` parameter references an object.
  - name: 'Null'
    test-code: |
      ctx->prio_ptr = NULL;
    text: |
      While the ``prioceiling`` parameter is equal to NULL.
  test-epilogue: null
  test-prologue: null
rationale: null
