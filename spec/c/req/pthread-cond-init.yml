post-conditions:
- name: Status
  states:
  - name: Zero
    test-code: |
      T_eq_int( ctx->status, 0 );
    text: |
      The return value of ${../if/pthread-cond-init:/name} shall be equal to zero.
  - name: EINVAL
    test-code: |
      T_eq_int( ctx->status, EINVAL );
    text: |
      The return value of ${../if/pthread-cond-init:/name} shall be equal to
      ${../if/einval:/name}.
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Object
  states:
  - name: Valid
    test-code: |
      ctx->obj = &ctx->obj_obj;
    text: |
      While the first parameter references an object.
  - name: 'Null'
    test-code: |
      ctx->obj = NULL;
    text: |
      While the first parameter is equal to NULL.
  test-epilogue: null
  test-prologue: null
