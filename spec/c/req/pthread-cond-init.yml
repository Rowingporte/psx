enabled-by: true
functional-type: action
links:
- role: interface-function
  uid: ../if/pthread-cond-init
post-conditions:
- name: Status
  states:
  - name: Zero
    test-code: 'T_eq_int( ctx->status, 0 );

      '
    text: 'The return value of ${../if/pthread-cond-init:/name} shall be equal to zero.

      '
  - name: EINVAL
    test-code: 'T_eq_int( ctx->status, EINVAL );

      '
    text: 'The return value of ${../if/pthread-cond-init:/name} shall be equal to

      ${../if/einval:/name}.

      '
  test-epilogue: null
  test-prologue: null
pre-conditions:
- name: Object
  states:
  - name: Valid
    test-code: 'ctx->obj = &ctx->obj_obj;

      '
    text: 'While the ``cond`` parameter references an object.

      '
  - name: 'Null'
    test-code: 'ctx->obj = NULL;

      '
    text: 'While the ``cond`` parameter is equal to NULL.

      '
  test-epilogue: null
  test-prologue: null
- name: Attr
  states:
  - name: 'Null'
    test-code: 'ctx->attr = NULL;

      '
    text: 'While the ``attr`` parameter is equal to NULL.

      '
  - name: Default
    test-code: '(void) pthread_condattr_init( &ctx->attr_obj );

      ctx->attr = &ctx->attr_obj;

      '
    text: 'While the ``attr`` parameter references default attributes.

      '
  - name: Uninitialized
    test-code: 'memset( &ctx->attr_obj, 0, sizeof( ctx->attr_obj ) );

      ctx->attr = &ctx->attr_obj;

      '
    text: 'While the ``attr`` parameter references uninitialized attributes.

      '
  - name: BadPshared
    test-code: '(void) pthread_condattr_init( &ctx->attr_obj );

      ctx->attr_obj.process_shared = 0x7fffffff;

      ctx->attr = &ctx->attr_obj;

      '
    text: 'While the ``attr`` parameter specifies an invalid process-shared value.

      '
  test-epilogue: null
  test-prologue: null
rationale: null
